<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Fresh Mangoes</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-amber-50 text-stone-800 font-sans">

    <header class="bg-gradient-to-r from-amber-400 to-orange-500 text-white py-16 px-6 text-center shadow-md">
        <h1 class="text-4xl md:text-6xl font-extrabold tracking-tight">Fresh & Juicy Mangoes</h1>
        <p class="mt-4 text-lg md:text-xl max-w-2xl mx-auto opacity-90">Straight from the orchards to your doorstep.</p>
        <a href="#contact" class="mt-6 inline-block bg-white text-orange-600 font-bold px-6 py-3 rounded-full shadow hover:bg-orange-50 transition">Order Now</a>
    </header>

    <main class="max-w-6xl mx-auto px-6 py-12">
        <h2 class="text-3xl font-bold text-center text-orange-800 mb-8">Our Premium Varieties</h2>
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <div class="bg-white rounded-2xl shadow-md overflow-hidden hover:shadow-xl transition">
                <img src="https://images.unsplash.com/photo-1553279768-865429fa0078?auto=format&fit=crop&w=600&q=80" alt="Fazli Mango" class="w-full h-56 object-cover">
                <div class="p-6">
                    <h3 class="text-xl font-bold text-stone-900">Premium Himsagar</h3>
                </div>
            </div>

            <div class="bg-white rounded-2xl shadow-md overflow-hidden hover:shadow-xl transition">
                <img src="https://images.unsplash.com/photo-1601004890684-d8cbf643f5f2?auto=format&fit=crop&w=600&q=80" alt="Langra Mango" class="w-full h-56 object-cover">
                <div class="p-6">
                    <h3 class="text-xl font-bold text-stone-900">Choice Langra</h3>
                </div>
            </div>

            <div class="bg-white rounded-2xl shadow-md overflow-hidden hover:shadow-xl transition">
                <img src="https://images.unsplash.com/photo-1591073113125-e46713c829ed?auto=format&fit=crop&w=600&q=80" alt="Amrapali Mango" class="w-full h-56 object-cover">
                <div class="p-6">
                    <h3 class="text-xl font-bold text-stone-900">Sweet Amrapali</h3>
                </div>
            </div>
        </div>
    </main>

    <section id="contact" class="bg-orange-600 text-white py-12 px-6 text-center">
        <h2 class="text-3xl font-bold mb-4">Place Your Order</h2>
        <p class="mb-8 opacity-90">Contact us directly via Phone or WhatsApp.</p>
        
        <div class="flex flex-col sm:flex-row justify-center items-center gap-6">
            <a href="https://wa.me/8801XXXXXXXXX" target="_blank" class="bg-green-500 hover:bg-green-600 text-white font-bold px-6 py-3 rounded-xl shadow transition">Chat on WhatsApp</a>
            <a href="tel:+8801XXXXXXXXX" class="bg-stone-900 hover:bg-stone-800 text-white font-bold px-6 py-3 rounded-xl shadow transition">Call: +880 1XXX-XXXXXX</a>
        </div>
    </section>

</body>
</html>
